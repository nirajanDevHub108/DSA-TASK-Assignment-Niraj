name: Python CI

on:
  pull_request:
    branches: [ main ]

jobs:
  compile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Get Changed Python Files
        id: changed_files
        run: |
          echo "FILES=$(git diff --name-only origin/main | grep '\.py$' || true)" >> $GITHUB_ENV

      - name: Compile Changed Python Files
        run: |
          if [ -z "$FILES" ]; then
            echo "No Python files changed."
          else
            for file in $FILES; do
              echo "Compiling $file"
              python -m py_compile "$file"
            done
          fi
